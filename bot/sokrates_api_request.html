<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sokrates - Læringsassistent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }

        .chat-container {
            height: calc(100vh - 160px);
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 231, 235, 0.5);
        }

        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3b82f6;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- API Key Setup Screen -->
    <div id="setup-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-50">
        <div class="w-full max-w-md p-8 bg-white rounded-2xl shadow-xl border border-gray-100">
            <h1 class="text-2xl font-semibold mb-6 text-center text-gray-800">Velkommen til Sokrates</h1>
            <p class="text-sm text-gray-500 mb-6 text-center">Skriv inn din Mistral API-nøkkel for å starte samtalen.</p>
            <div class="space-y-4">
                <input type="password" id="api-key-input" 
                    placeholder="Mistral API-nøkkel (Bearer)" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                <button id="confirm-key-btn" 
                    class="w-full bg-gray-900 text-white font-medium py-3 rounded-xl hover:bg-gray-800 transition-colors">
                    Bekreft og start
                </button>
            </div>
            <p class="mt-4 text-[10px] text-gray-400 text-center uppercase tracking-widest">Nøkkelen lagres kun lokalt i denne økten</p>
        </div>
    </div>

    <!-- Main App Interface (Hidden by default) -->
    <div id="app-interface" class="hidden max-w-3xl mx-auto h-screen flex flex-col p-4 md:p-6">
        
        <!-- Header -->
        <header class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">S</div>
                <div>
                    <h2 class="font-semibold text-gray-800">Sokrates</h2>
                    <p class="text-xs text-green-500 flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span> Online
                    </p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-xs text-gray-400 hover:text-gray-600">Bytt API-nøkkel</button>
        </header>

        <!-- Chat History -->
        <div id="chat-history" class="chat-container overflow-y-auto space-y-4 mb-4 pr-2">
            <!-- First message from Socrates -->
            <div class="flex justify-start">
                <div class="bg-white border border-gray-200 rounded-2xl px-4 py-3 max-w-[85%] shadow-sm">
                    <p class="text-sm text-gray-700">Hei! Jeg er Sokrates. Hva jobber du med i dag?</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="mt-auto">
            <div id="status-indicator" class="hidden mb-2 px-2">
                <div class="flex items-center gap-2 text-xs text-gray-500">
                    <div class="spinner"></div>
                    <span>Sokrates tenker...</span>
                </div>
            </div>
            <form id="chat-form" class="relative">
                <input type="text" id="user-input" 
                    placeholder="Skriv ditt svar her..." 
                    class="w-full bg-white border border-gray-200 rounded-2xl pl-4 pr-12 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all"
                    autocomplete="off">
                <button type="submit" 
                    class="absolute right-2 top-2 bottom-2 bg-blue-600 text-white px-4 rounded-xl hover:bg-blue-700 transition-colors flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                    </svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        let apiKey = '';
        let messageCount = 0;
        const chatHistory = [
            { role: "assistant", content: "Hei! Jeg er Sokrates. Hva jobber du med i dag?" }
        ];

        const setupScreen = document.getElementById('setup-screen');
        const appInterface = document.getElementById('app-interface');
        const apiKeyInput = document.getElementById('api-key-input');
        const confirmKeyBtn = document.getElementById('confirm-key-btn');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatDisplay = document.getElementById('chat-history');
        const statusIndicator = document.getElementById('status-indicator');

        // Initial setup
        confirmKeyBtn.addEventListener('click', () => {
            const val = apiKeyInput.value.trim();
            if (val) {
                apiKey = val;
                setupScreen.classList.add('hidden');
                appInterface.classList.remove('hidden');
            } else {
                showToast("Vennligst oppgi en API-nøkkel.");
            }
        });

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message to UI
            addMessageToUI('user', text);
            userInput.value = '';
            messageCount++;

            // Prepare prompt based on instructions
            let systemPrompt = `Du er Sokrates, en bot som veileder elever. 
                Dette er din nåværende status: Eleven har sendt ${messageCount} svar.
                Regler:
                - De 3 første gangene skal du ALDRI svare direkte på spørsmål, men stille dype, veiledende oppfølgingsspørsmål for å få eleven til å tenke selv.
                - ETTER de 3 gangene (når teller er 4 eller mer), skal du oppsummere det eleven har sagt, gi en vurdering av hva de bør øve mer på, og spørre om de vil ha en forklaring eller øve mer.
                - Svar kort og konsist på norsk.`;

            chatHistory.push({ role: "user", content: text });
            
            await getSocratesResponse(systemPrompt);
        });

        async function getSocratesResponse(systemPrompt) {
            statusIndicator.classList.remove('hidden');
            
            const messages = [
                { role: "system", content: systemPrompt },
                ...chatHistory
            ];

            try {
                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "open-mistral-7b",
                        messages: messages
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Feil: ${response.status}`);
                }

                const data = await response.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || data.choices?.[0]?.message?.content;
                
                if (aiText) {
                    chatHistory.push({ role: "assistant", content: aiText });
                    addMessageToUI('assistant', aiText);
                }

            } catch (error) {
                console.error(error);
                addMessageToUI('assistant', "Beklager, jeg fikk ikke kontakt med oraklet mitt (API-feil). Sjekk om nøkkelen er riktig.");
            } finally {
                statusIndicator.classList.add('hidden');
            }
        }

        function addMessageToUI(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const bubble = document.createElement('div');
            bubble.className = role === 'user' 
                ? 'bg-blue-600 text-white rounded-2xl px-4 py-3 max-w-[85%] shadow-md' 
                : 'bg-white border border-gray-200 rounded-2xl px-4 py-3 max-w-[85%] shadow-sm text-gray-700';
            
            bubble.textContent = text;
            wrapper.appendChild(bubble);
            chatDisplay.appendChild(wrapper);
            
            // Auto scroll
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        function showToast(msg) {
            alert(msg); // Enkel fallback siden vi ikke skal bruke komplekse biblioteker
        }
    </script>
</body>
</html>
