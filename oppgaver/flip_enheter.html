<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fysikk 2 - Enhetsøving med KI</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg: #f1f5f9;
            --text: #0f172a;
            --card-front: #ffffff;
            --card-back: #eff6ff;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin-bottom: 3rem;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        p { color: #64748b; font-size: 1.1rem; }

        .topic-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn:hover { background-color: var(--primary-dark); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { background-color: #94a3b8; cursor: not-allowed; }

        .flashcards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1100px;
        }

        .card-container {
            perspective: 1000px;
            height: 420px;
            width: 100%;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            box-sizing: border-box;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
        }

        .card-front {
            background-color: var(--card-front);
            justify-content: space-between;
        }

        .card-back {
            background-color: var(--card-back);
            transform: rotateY(180deg);
            justify-content: center;
            text-align: center;
        }

        .question-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 500;
            flex-grow: 1;
            display: flex;
            align-items: center;
            line-height: 1.5;
        }

        .answer-area {
            margin-top: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        .feedback-content {
            font-size: 1rem;
            line-height: 1.6;
            overflow-y: auto;
            max-height: 250px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            border: 2px dashed #cbd5e1;
            border-radius: 1rem;
            color: #64748b;
        }
        
        .error-msg {
            color: #ef4444;
            background: #fef2f2;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Fysikk 2: Enhetstrener</h1>
        <p>Øv på krevende enheter i fysikk. Velg en kategori for å generere tre unike oppgaver med kunstig intelligens.</p>
    </header>

    <div class="topic-selector">
        <button class="btn" onclick="initTopic('Laboppgaver')">Laboppgaver</button>
        <button class="btn" onclick="initTopic('Oppgaver')">Oppgaver</button>
        <button class="btn" onclick="initTopic('Annet')">Annet</button>
    </div>

    <div class="flashcards-grid" id="grid">
        <div class="empty-state">
            Klikk på en kategori over for å generere oppgaver...
        </div>
    </div>

    <script>
        // --- KONFIGURASJON ---
        const apiKey = ""; // API-nøkkel injiseres automatisk her ved kjøring

        // --- KI-FUNKSJON MED RETRY-LOGIKK ---
        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            let delay = 1000;
            const maxAttempts = 5;

            for (let i = 0; i < maxAttempts; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || "Ukjent API-feil");
                    }

                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (!text) throw new Error("Tomt svar fra modellen");
                    return text;

                } catch (error) {
                    if (i === maxAttempts - 1) throw error;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        // --- APPLIKASJONSLOGIKK ---
        async function initTopic(category) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="empty-state"><div class="loader"></div> Lager spørsmål for ' + category + '...</div>';

            const prompt = `Du er en fysikklærer. Lag 3 korte spørsmål om enheter i Fysikk 2 som passer under kategorien "${category}". 
            ${category === 'Laboppgaver' ? 'Fokuser på enheter brukt i målinger, usikkerhet og utstyr.' : ''}
            ${category === 'Oppgaver' ? 'Fokuser på komplekse enhetsutledninger fra teoretiske oppgaver (f.eks. magnetisme, induksjon, felt).' : ''}
            ${category === 'Annet' ? 'Lag varierte spørsmål om SI-systemet og sammensatte enheter i fysikk.' : ''}
            Svar KUN med de 3 spørsmålene separert med tegnet "###". Ingen tall eller intro.`;

            try {
                const response = await callGemini(prompt);
                const questions = response.split('###').map(q => q.trim()).filter(q => q.length > 5);
                renderCards(questions);
            } catch (err) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="error-msg">
                            <strong>Feil ved henting:</strong><br>
                            ${err.message}<br><br>
                            Prøv å laste siden på nytt eller sjekk at API-nøkkelen er korrekt konfigurert.
                        </div>
                    </div>`;
            }
        }

        function renderCards(questions) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            questions.slice(0, 3).forEach((q, i) => {
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'card-container';
                cardWrapper.innerHTML = `
                    <div class="card" id="card-${i}">
                        <div class="card-face card-front">
                            <div>
                                <div class="question-label">Oppgave ${i + 1}</div>
                                <div class="question-text">${q}</div>
                            </div>
                            <div class="answer-area">
                                <input type="text" id="input-${i}" placeholder="Skriv ditt svar..." onkeypress="if(event.key==='Enter') evaluateAnswer(${i}, '${q.replace(/'/g, "\\'")}')">
                                <button class="btn" style="width: 100%" onclick="evaluateAnswer(${i}, '${q.replace(/'/g, "\\'")}')">Sjekk svar & flipp</button>
                            </div>
                        </div>
                        <div class="card-face card-back">
                            <div class="question-label">Vurdering fra KI</div>
                            <div id="feedback-${i}" class="feedback-content">
                                <div class="loader"></div>
                                Tenker...
                            </div>
                            <button class="btn" style="margin-top: 1.5rem; background: transparent; border: 1px solid var(--primary); color: var(--primary)" onclick="flipCard(${i})">Se spørsmål igjen</button>
                        </div>
                    </div>
                `;
                grid.appendChild(cardWrapper);
            });
        }

        async function evaluateAnswer(index, question) {
            const input = document.getElementById(`input-${index}`);
            const feedbackBox = document.getElementById(`feedback-${index}`);
            const answer = input.value.trim();

            if (!answer) return;

            flipCard(index);
            feedbackBox.innerHTML = '<div class="loader"></div> Analyserer svaret...';

            const prompt = `Som fysikklærer, vurder dette svaret.
            Spørsmål: "${question}"
            Elevens svar: "${answer}"
            Svar kort (maks 3 setninger). Bekreft om det er korrekt. Bruk standard tegn for enheter.`;

            try {
                const feedback = await callGemini(prompt);
                feedbackBox.innerHTML = feedback;
            } catch (err) {
                feedbackBox.innerHTML = '<div class="error-msg">Kunne ikke hente vurdering.</div>';
            }
        }

        function flipCard(index) {
            const card = document.getElementById(`card-${index}`);
            card.classList.toggle('is-flipped');
        }
    </script>
</body>
</html>
