<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fysikk 2 - Enhetsøving med Mistral AI</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg: #f8fafc;
            --text: #0f172a;
            --card-front: #ffffff;
            --card-back: #f0f9ff;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        #setup-screen {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .setup-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid #e2e8f0;
        }

        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 2px solid #e2e8f0;
            border-radius: 0.6rem;
            box-sizing: border-box;
            font-size: 1rem;
        }

        #app-content {
            display: none; 
            width: 100%;
            max-width: 1000px;
            flex-direction: column;
        }

        header { text-align: center; margin-bottom: 2rem; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; }

        .topic-selector {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 0.6rem;
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover { background-color: var(--primary-dark); transform: translateY(-1px); }
        .btn:disabled { background-color: #94a3b8; cursor: not-allowed; transform: none; }

        .flashcards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card-container { perspective: 1000px; height: 380px; }
        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            padding: 2rem;
            box-sizing: border-box;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .card-front { background: var(--card-front); }
        .card-back { background: var(--card-back); transform: rotateY(180deg); text-align: center; justify-content: center; }

        .q-label { font-weight: 800; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 1rem; }
        .q-text { font-size: 1.1rem; flex-grow: 1; display: flex; align-items: center; }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .error-msg {
            background: #fef2f2;
            color: #b91c1c;
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #fee2e2;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: left;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h2>Fysikk 2 Enhetstrener</h2>
            <p>Skriv inn din Mistral API-nøkkel for å starte.</p>
            <input type="password" id="api-key-input" placeholder="Lim inn Mistral API-nøkkel her...">
            <button class="btn" style="width:100%" onclick="startApp()">Bekreft og start</button>
            <p id="setup-error" style="color:red; font-size:0.8rem; margin-top:10px; display:none;">Vennligst oppgi en gyldig nøkkel.</p>
        </div>
    </div>

    <div id="app-content">
        <header>
            <h1>Enhetstrener (Mistral AI)</h1>
            <p>Mekanikk, Felt og Induksjon</p>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:0.8rem; text-decoration:underline;">Bytt API-nøkkel</button>
        </header>

        <div class="topic-selector">
            <button class="btn" onclick="loadQuestions('Mekanikk')">Mekanikk</button>
            <button class="btn" onclick="loadQuestions('Felt')">Felt</button>
            <button class="btn" onclick="loadQuestions('Induksjon')">Induksjon</button>
        </div>

        <div id="grid" class="flashcards-grid">
            <div style="grid-column: 1/-1; text-align: center; color: #64748b; padding-top: 3rem;">
                Velg et emne for å generere oppgaver med open-mistral-7b...
            </div>
        </div>
    </div>

    <script>
        let apiKey = "";

        function startApp() {
            const input = document.getElementById('api-key-input').value.trim();
            if (input.length < 5) {
                document.getElementById('setup-error').style.display = 'block';
                return;
            }
            apiKey = input;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
        }

        async function callMistral(prompt) {
            // Prøver direkte anrop først (fungerer ofte på GitHub/Netlify)
            const url = "https://api.mistral.ai/v1/chat/completions";
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "open-mistral-7b",
                        messages: [{ role: "user", content: prompt }]
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    let errorData;
                    try { errorData = JSON.parse(errorText); } catch(e) { errorData = { message: errorText }; }
                    throw new Error(`Mistral API feil (${response.status}): ${errorData.message || 'Ukjent feil'}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (err) {
                // Hvis direkte anrop feiler pga CORS (lokalt), prøver vi med proxy som fallback
                if (err.message.includes('fetch') || err.message.includes('CORS')) {
                    console.log("Prøver med proxy-fallback...");
                    const proxyUrl = "https://corsproxy.io/?";
                    const encodedUrl = encodeURIComponent(url);
                    const proxyResponse = await fetch(proxyUrl + encodedUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: "open-mistral-7b",
                            messages: [{ role: "user", content: prompt }]
                        })
                    });
                    
                    if (!proxyResponse.ok) throw new Error("Både direkte og proxy-anrop feilet.");
                    const data = await proxyResponse.json();
                    return data.choices[0].message.content;
                }
                throw err;
            }
        }

        async function loadQuestions(topic) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div style="grid-column:1/-1; text-align:center;"><div class="loader"></div><p>Mistral genererer oppgaver om ' + topic + '...</p></div>';

            const prompt = `Du er en fysikklærer. Lag 3 korte spørsmål om enheter i "${topic}". Svar kun med spørsmålene adskilt med "###".`;

            try {
                const text = await callMistral(prompt);
                const qArray = text.split('###').map(s => s.trim()).filter(s => s.length > 5);
                
                grid.innerHTML = '';
                qArray.slice(0, 3).forEach((q, i) => {
                    const div = document.createElement('div');
                    div.className = 'card-container';
                    div.innerHTML = `
                        <div class="card" id="card-${i}">
                            <div class="card-face card-front">
                                <div class="q-label">Spørsmål ${i+1}</div>
                                <div class="q-text">${q}</div>
                                <div style="margin-top:1rem;">
                                    <input type="text" id="ans-${i}" placeholder="Ditt svar..." onkeypress="if(event.key==='Enter') check(${id}, '${q.replace(/'/g, "\\'")}')">
                                    <button id="btn-${i}" class="btn" style="width:100%" onclick="check(${i}, '${q.replace(/'/g, "\\'")}')">Sjekk svar</button>
                                </div>
                            </div>
                            <div class="card-face card-back">
                                <div class="q-label">Vurdering</div>
                                <div id="feedback-${i}" style="font-size:0.95rem; line-height:1.4;"></div>
                                <button class="btn" style="margin-top:1.5rem; background:#cbd5e1; color:#334155" onclick="flip(${i})">Tilbake</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(div);
                });
            } catch (err) {
                grid.innerHTML = `<div class="error-msg"><strong>Feil:</strong> ${err.message}</div>`;
            }
        }

        async function check(id, question) {
            const answerInput = document.getElementById(`ans-${id}`);
            const answer = answerInput.value.trim();
            if (!answer) return;

            flip(id);
            const feedbackElem = document.getElementById(`feedback-${id}`);
            feedbackElem.innerHTML = '<div class="loader" style="margin-top:2rem;"></div>';

            const prompt = `Elev svarte "${answer}" på "${question}". Er det rett? Forklar kort (maks 30 ord).`;

            try {
                const result = await callMistral(prompt);
                feedbackElem.innerHTML = result;
            } catch (err) {
                feedbackElem.innerHTML = "Feil ved henting av vurdering.";
            }
        }

        function flip(id) {
            document.getElementById(`card-${id}`).classList.toggle('is-flipped');
        }
    </script>
</body>
</html>
