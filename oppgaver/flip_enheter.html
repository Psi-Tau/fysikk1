<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fysikk 2 - Enhetsøving med KI</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg: #f1f5f9;
            --text: #0f172a;
            --card-front: #ffffff;
            --card-back: #eff6ff;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }

        #setup-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .setup-card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .setup-card input {
            width: 100%;
            padding: 0.75rem;
            margin: 1rem 0;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            box-sizing: border-box;
            font-family: monospace;
        }

        #app-content {
            display: none; 
            width: 100%;
            max-width: 1100px;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            max-width: 800px;
            margin-bottom: 3rem;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--primary); }
        p { color: #64748b; font-size: 1.1rem; }

        .topic-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn:hover { background-color: var(--primary-dark); transform: translateY(-2px); }

        .flashcards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            width: 100%;
        }

        .card-container {
            perspective: 1000px;
            height: 420px;
            width: 100%;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            box-sizing: border-box;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
        }

        .card-front {
            background-color: var(--card-front);
            justify-content: space-between;
        }

        .card-back {
            background-color: var(--card-back);
            transform: rotateY(180deg);
            justify-content: center;
            text-align: center;
        }

        .question-label {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 500;
            flex-grow: 1;
            display: flex;
            align-items: center;
            line-height: 1.5;
        }

        .answer-area {
            margin-top: 1.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            border: 2px dashed #cbd5e1;
            border-radius: 1rem;
            color: #64748b;
        }
        
        .error-msg {
            color: #ef4444;
            background: #fef2f2;
            padding: 1.5rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            text-align: left;
            border: 1px solid #fee2e2;
            max-width: 100%;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h3>Fysikk 2 Øving</h3>
            <p style="font-size: 0.9rem;">Lim inn din Gemini API-nøkkel for å starte.</p>
            <input type="password" id="api-key-input" placeholder="Lim inn nøkkel (AIza...)">
            <button class="btn" style="width:100%" onclick="confirmKey()">Bekreft Nøkkel</button>
        </div>
    </div>

    <div id="app-content">
        <header>
            <h1>Enhetstrener: Fysikk 2</h1>
            <p>Generer oppgaver om enheter innen mekanikk, felt og induksjon.</p>
        </header>

        <div class="topic-selector">
            <button class="btn" onclick="initTopic('Mekanikk')">Mekanikk</button>
            <button class="btn" onclick="initTopic('Felt')">Felt</button>
            <button class="btn" onclick="initTopic('Induksjon')">Induksjon</button>
        </div>

        <div id="grid" class="flashcards-grid">
            <div class="empty-state">Velg et emne for å generere oppgaver...</div>
        </div>
    </div>

    <script>
        let apiKey = "";

        function confirmKey() {
            const input = document.getElementById('api-key-input');
            const val = input.value.trim();
            if (val.length > 10) {
                apiKey = val;
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'flex';
            }
        }

        async function callGemini(prompt) {
            // Bruker v1beta for Gemini 2.5 Flash
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            let delay = 1000;
            const maxAttempts = 5;

            for (let i = 0; i < maxAttempts; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        // Kaster en detaljert feilmelding fra API-et
                        const msg = data.error?.message || response.statusText;
                        const code = data.error?.status || response.status;
                        throw new Error(`[${code}] ${msg}`);
                    }

                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error("KI returnerte et tomt svar.");
                    
                    return text;

                } catch (error) {
                    if (i === maxAttempts - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        async function initTopic(category) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="empty-state"><div class="loader"></div> Lager oppgaver om ' + category + '...</div>';

            const prompt = `Lag 3 utfordrende spørsmål om fysikkenheter for emnet "${category}" i Fysikk 2. 
            Fokus: SI-enheter og sammensatte enheter. 
            Mekanikk: Kraft, energi, impuls. 
            Felt: Elektriske og magnetiske felt (Tesla, Volt/meter). 
            Induksjon: Fluks (Weber), ems, induktans.
            Svar kun med de 3 spørsmålene adskilt med "###". Ingen tall eller tekst før/etter.`;

            try {
                const response = await callGemini(prompt);
                const questions = response.split('###').map(q => q.trim()).filter(q => q.length > 5);
                renderCards(questions);
            } catch (err) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="error-msg">
                            <strong>Det oppstod en feil:</strong><br>
                            ${err.message}<br><br>
                            <em>Hvis feilen inneholder "403" eller "API_KEY_INVALID", er nøkkelen feil. Hvis den er tom, kan det være at Canvas blokkerer forespørselen.</em>
                        </div>
                    </div>`;
            }
        }

        function renderCards(questions) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            questions.slice(0, 3).forEach((q, i) => {
                const cardWrapper = document.createElement('div');
                cardWrapper.className = 'card-container';
                const escapedQ = q.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                cardWrapper.innerHTML = `
                    <div class="card" id="card-${i}">
                        <div class="card-face card-front">
                            <div>
                                <div class="question-label">Spørsmål ${i + 1}</div>
                                <div class="question-text">${q}</div>
                            </div>
                            <div class="answer-area">
                                <input type="text" id="input-${i}" placeholder="Svar her..." onkeypress="if(event.key==='Enter') evaluateAnswer(${i}, '${escapedQ}')">
                                <button class="btn" style="width: 100%" onclick="evaluateAnswer(${i}, '${escapedQ}')">Sjekk svar</button>
                            </div>
                        </div>
                        <div class="card-face card-back">
                            <div class="question-label">Vurdering</div>
                            <div id="feedback-${i}" class="feedback-content">
                                <div class="loader"></div>
                            </div>
                            <button class="btn" style="margin-top: 1rem; background: transparent; border: 1px solid var(--primary); color: var(--primary)" onclick="flipCard(${i})">Se spørsmål</button>
                        </div>
                    </div>
                `;
                grid.appendChild(cardWrapper);
            });
        }

        async function evaluateAnswer(index, question) {
            const input = document.getElementById(`input-${index}`);
            const feedbackBox = document.getElementById(`feedback-${index}`);
            const answer = input.value.trim();

            if (!answer) return;

            flipCard(index);
            feedbackBox.innerHTML = '<div class="loader"></div>';

            const prompt = `Som fysikklærer, vurder kort om dette svaret på enhetsoppgaven er riktig. 
            Oppgave: "${question}" 
            Svar: "${answer}" 
            Svar med maks to korte setninger.`;

            try {
                const feedback = await callGemini(prompt);
                feedbackBox.innerHTML = feedback;
            } catch (err) {
                feedbackBox.innerHTML = 'Kunne ikke vurdere svar: ' + err.message;
            }
        }

        function flipCard(index) {
            const card = document.getElementById(`card-${index}`);
            card.classList.toggle('is-flipped');
        }
    </script>
</body>
</html>
