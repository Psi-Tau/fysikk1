<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fysikk 2 - Interaktive Øvingskort</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .flip-card {
            perspective: 1000px;
            height: 300px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180px);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .flip-card-front {
            background-color: white;
            border: 2px solid #e5e7eb;
        }
        .flip-card-back {
            background-color: #f9fafb;
            transform: rotateY(180deg);
            border: 2px solid #3b82f6;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">Fysikk 2 Øvingsportal</h1>
            <p class="text-slate-600">Velg et tema for å generere 10 unike utfordringer</p>
            
            <div class="mt-6 flex flex-wrap justify-center gap-3">
                <button onclick="generateCards('Bevegelsesmengde og støt')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">Bevegelsesmengde</button>
                <button onclick="generateCards('Elektriske og magnetiske felt')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">Feltfysikk</button>
                <button onclick="generateCards('Lys og bølger (kvantefysikk)')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">Kvantefysikk</button>
                <button onclick="generateCards('Relativitetsteori')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">Relativitet</button>
                <button onclick="generateCards('Standardmodellen og kjernefysikk')" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">Kjernefysikk</button>
            </div>
        </header>

        <div id="status-message" class="text-center mb-4 hidden">
            <div class="inline-flex items-center gap-2 text-blue-600 font-medium">
                <div class="loader"></div>
                <span id="status-text">Genererer spørsmål...</span>
            </div>
        </div>

        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 10 Tomme kort genereres her -->
        </div>
    </div>

    <script>
        const apiKey = "";
        let currentTopic = "";

        // UI Initialization: Lag 10 tomme kort
        function initEmptyCards() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                container.innerHTML += createCardHTML(i, "Velg et tema over for å starte", true);
            }
        }

        function createCardHTML(id, content, isEmpty = false) {
            return `
                <div id="card-${id}" class="flip-card ${isEmpty ? 'opacity-50' : ''}">
                    <div class="flip-card-inner" id="inner-${id}">
                        <!-- Forside -->
                        <div class="flip-card-front">
                            <span class="text-xs font-bold text-blue-500 mb-2 uppercase tracking-wider">Oppgave ${id + 1}</span>
                            <p class="text-slate-800 font-medium text-lg mb-4">${content}</p>
                            ${!isEmpty ? `
                                <div class="w-full mt-auto">
                                    <input type="text" id="input-${id}" placeholder="Ditt svar..." 
                                        class="w-full border p-2 rounded mb-2 focus:ring-2 focus:ring-blue-400 outline-none">
                                    <button onclick="checkAnswer(${id})" 
                                        class="w-full bg-slate-800 text-white py-2 rounded hover:bg-slate-700 transition">Sjekk svar</button>
                                </div>
                            ` : ''}
                        </div>
                        <!-- Bakside -->
                        <div class="flip-card-back">
                            <h3 class="font-bold text-blue-600 mb-2">Tilbakemelding</h3>
                            <div id="feedback-${id}" class="text-sm text-slate-700 mb-4 overflow-y-auto max-h-40 text-left">
                                Analyserer...
                            </div>
                            <button onclick="toggleCard(${id})" class="mt-auto text-xs text-slate-500 underline">Se spørsmål igjen</button>
                        </div>
                    </div>
                </div>
            `;
        }

        async function callGemini(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            let delay = 1000;
            
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        async function generateCards(topic) {
            currentTopic = topic;
            const status = document.getElementById('status-message');
            const statusText = document.getElementById('status-text');
            status.classList.remove('hidden');
            statusText.innerText = `Lager 10 spørsmål om ${topic}...`;

            const prompt = `Lag 10 korte og varierte spørsmål for faget Fysikk 2 (videregående skole) om temaet "${topic}". 
            Svarene skal være korte (maks en setning eller et tall med enhet). 
            Returner kun som en JSON-liste med strenger: ["spørsmål1", "spørsmål2", ...]`;

            try {
                const result = await callGemini(prompt);
                // Rens JSON hvis AI legger til markdown-formatering
                const cleanedJson = result.replace(/```json|```/g, '').trim();
                const questions = JSON.parse(cleanedJson);

                const container = document.getElementById('cards-container');
                container.innerHTML = '';
                questions.forEach((q, index) => {
                    container.innerHTML += createCardHTML(index, q, false);
                });
            } catch (error) {
                console.error(error);
                alert("Kunne ikke hente spørsmål. Sjekk API-nøkkelen.");
            } finally {
                status.classList.add('hidden');
            }
        }

        async function checkAnswer(id) {
            const input = document.getElementById(`input-${id}`);
            const userAnswer = input.value.trim();
            if (!userAnswer) return;

            const card = document.getElementById(`card-${id}`);
            const inner = document.getElementById(`inner-${id}`);
            const question = card.querySelector('.flip-card-front p').innerText;
            const feedbackDiv = document.getElementById(`feedback-${id}`);

            // Vis baksiden og lastestatus
            card.classList.add('flipped');
            feedbackDiv.innerHTML = '<div class="loader mx-auto"></div>';

            const prompt = `I kontekst av Fysikk 2, vurder dette svaret.
            Tema: ${currentTopic}
            Spørsmål: ${question}
            Elevens svar: ${userAnswer}
            
            Gi en kort tilbakemelding (maks 2 setninger). Start med "Riktig", "Delvis riktig" eller "Feil". 
            Vis deretter korrekt fasit. Bruk LaTeX-syntaks for formler (f.eks. $E=mc^2$).`;

            try {
                const feedback = await callGemini(prompt);
                feedbackDiv.innerHTML = feedback.replace(/\n/g, '<br>');
            } catch (error) {
                feedbackDiv.innerText = "Kunne ikke analysere svaret akkurat nå.";
            }
        }

        function toggleCard(id) {
            document.getElementById(`card-${id}`).classList.toggle('flipped');
        }

        // Start med tomme kort
        window.onload = initEmptyCards;
    </script>
</body>
</html>
